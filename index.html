<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>AR Cocktail Menu</title>
 <link rel="stylesheet" href="style.css" />
 <!-- model-viewer library -->
 <script type="module"
 src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
 <main class="app">
 <!-- MENU SCREEN -->
 <section id="menuScreen" class="screen active">
 <h1>AR Cocktail Menu</h1>
 <p class="intro">Choose a cocktail to view it in 3D and AR.</p>
 <div class="grid">
 <button class="cocktail-card"
 data-name="1"
 data-model="assets/models/1.glb"
 data-ios="assets/models/1.usdz"
 data-poster="assets/posters/1.jpg">
 <img src="assets/posters/1.jpg" alt="1">
 <span>1</span>
 </button>
 <button class="cocktail-card"
 data-name="2"
 data-model="assets/models/2.glb"
 data-ios="assets/models/2.usdz"
 data-poster="assets/posters/2.jpg">
 <img src="assets/posters/2.jpg" alt="2">
 <span>2</span>
 </button>
 <button class="cocktail-card"
 data-name="3"
 data-model="assets/models/3.glb"
 data-ios="assets/models/3.usdz"
 data-poster="assets/posters/3.jpg">
 <img src="assets/posters/3.jpg" alt="A3">
 <span>3</span>
 </button>
 </div>
 </section>
 <!-- 3D / AR VIEWER SCREEN -->
 <section id="viewerScreen" class="screen">
 <button id="backButton" class="back-button">Return To Menu</button>
 <h2 id="cocktailTitle">Cocktail</h2>
 <model-viewer
 id="cocktailViewer"
 src=""
 poster=""
 alt="3D cocktail model"
 ar
 ar-modes="webxr scene-viewer quick-look"
 camera-controls
 auto-rotate
 autoplay
 shadow-intensity="1"
 exposure="1"
 environment-image="neutral"
 style="width: 100%; height: 70vh;">
 </model-viewer>
 <p class="viewer-note">
 On supported mobile devices, use the AR button inside the viewer.
 </p>
 </section>
 </main>
 <script src="script.js"></script>
</body>
</html>
